<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Команды бота</title>
  <script src="https://st.max.ru/js/max-web-app.js"></script>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #222;
    }

    .card {
      max-width: 720px;
      margin: 0 auto;
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    h1 {
      margin: 0 0 10px;
    }

    .muted {
      color: #666;
      margin-bottom: 20px;
    }

    .row {
      border: 1px solid #e8e8e8;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
    }

    .title {
      font-weight: 700;
      font-size: 18px;
      margin-bottom: 6px;
    }

    .desc {
      color: #555;
      margin-bottom: 12px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
      background: #2563eb;
      color: white;
    }

    .secondary {
      background: #eef2ff;
      color: #1e3a8a;
    }

    .meta {
      margin-top: 14px;
      font-size: 13px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Команды бота</h1>
    <div class="muted">
      Нажми кнопку — откроется чат с ботом, и он выполнит нужное действие.
    </div>

    <div class="row">
      <div class="title">/help</div>
      <div class="desc">Открыть бота и показать подсказку</div>
      <div class="actions">
        <button onclick="openBotAction('help')">Подсказки</button>
      </div>
    </div>

    <div class="row">
      <div class="title">/clear</div>
      <div class="desc">Очистить историю переписки с ИИ</div>
      <div class="actions">
        <button onclick="openBotAction('clear')">Очистить</button>
      </div>
    </div>

    <div class="row">
      <div class="title">Вернуться в чат</div>
      <div class="desc">Открыть диалог с ботом без команды</div>
      <div class="actions">
        <button class="secondary" onclick="openBot()">Открыть чат</button>
      </div>
    </div>
    <div class="meta" id="meta"></div>
  </div>

  <script>
    function isInsideMax() {
      return Boolean(
        window.WebApp &&
        (
          (typeof window.WebApp.initData === "string" && window.WebApp.initData.length > 0) ||
          (window.WebApp.initDataUnsafe && typeof window.WebApp.initDataUnsafe === "object" && window.WebApp.initDataUnsafe.query_id)
        )
      );
    }

    const meta = document.getElementById("meta");

    if (isInsideMax()) {
      const platform = window.WebApp.platform || "unknown";
      const version = window.WebApp.version || "unknown";
      meta.textContent = `MAX • platform: ${platform} • version: ${version}`;
    } else {
      meta.textContent = "Открыто вне клиента MAX";
    }

    function getBotName() {
      const urlParams = new URLSearchParams(window.location.search);
      const fromUrl = urlParams.get("bot");
      if (fromUrl) return fromUrl;

      const startParam = window.WebApp?.initDataUnsafe?.start_param || "";
      const startParams = new URLSearchParams(startParam);
      return startParams.get("bot");
    }

    function openBot() {
      const botName = getBotName();

      const url = `https://max.ru/${botName}`;
      if (window.WebApp?.openMaxLink) {
        window.WebApp.openMaxLink(url);
      } else {
        window.location.href = url;
      }
    }

    function openBotAction(payload) {
      let botName = getBotName();

      // Safety cleanup in case platform appends extra query text oddly
      if (botName.includes("?")) {
        botName = botName.split("?")[0];
      }
      if (botName.includes("&")) {
        botName = botName.split("&")[0];
      }

      if (!botName) {
        alert("Имя бота не найдено");
        return;
      }

      const url = `https://max.ru/${botName}?start=${encodeURIComponent(payload)}`;

      if (window.WebApp?.openMaxLink) {
        window.WebApp.openMaxLink(url);
      } else {
        window.location.href = url;
      }
    }

  </script>

</body>
</html>
